services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ops_agent_chat
      POSTGRES_USER: opsagent
      POSTGRES_PASSWORD: opsagent_password
    ports:
      - "5432:5432"
    volumes:
      - ops_agent_postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsagent -d ops_agent_chat"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ops-agent-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://opsagent:opsagent_password@postgres:5432/ops_agent_chat}
      VIDEOHUB_SSH_HOST: ${VIDEOHUB_SSH_HOST:-host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs:ro
      - ${VIDEOHUB_SSH_KEY_HOST_DIR:-./secrets}:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: ops-agent-frontend
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: ops-agent-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://opsagent:opsagent_password@postgres:5432/ops_agent_chat}
      VIDEOHUB_SSH_HOST: ${VIDEOHUB_SSH_HOST:-host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docs:/app/docs:ro
      - ${VIDEOHUB_SSH_KEY_HOST_DIR:-./secrets}:/run/secrets:ro
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]

volumes:
  ops_agent_postgres_data:
