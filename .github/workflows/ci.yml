name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ops_agent_chat
          POSTGRES_USER: opsagent
          POSTGRES_PASSWORD: opsagent_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsagent -d ops_agent_chat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://opsagent:opsagent_password@127.0.0.1:5432/ops_agent_chat
      APP_SECRET_KEY: ci-only-secret-key-with-more-than-32-characters
      DEEPSEEK_API_KEY: ci-placeholder-key
      SSH_STRICT_HOST_KEY_CHECKING: "true"
      RUN_DOCKER_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - name: Compile capability registry
        working-directory: backend
        run: python -c "from app.capabilities.registry import CapabilityRegistry; CapabilityRegistry()"
      - name: Backend static checks
        run: ruff check --select E9,F63,F7,F82 backend/app backend/tests
      - name: Security module type checks
        run: mypy --ignore-missing-imports --follow-imports=skip backend/app/runtime/verification.py backend/app/policy/action_hash.py
      - name: Migration round trip
        run: PYTHONPATH=backend python backend/scripts/check_migrations.py
      - name: Backend tests
        run: PYTHONPATH=backend pytest -q --cov=app --cov-report=term-missing --cov-report=xml backend/tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build
      - name: Frontend HTTP smoke test
        working-directory: frontend
        run: |
          npm run preview -- --port 4173 > /tmp/ops-agent-preview.log 2>&1 &
          for attempt in {1..30}; do curl -fsS http://127.0.0.1:4173 >/dev/null && break; sleep 1; done
          E2E_BASE_URL=http://127.0.0.1:4173 E2E_SKIP_API=1 npm run test:e2e

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare non-secret CI environment
        run: cp .env.example .env
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Build application images
        run: docker compose build backend worker frontend
